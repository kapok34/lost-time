name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Generate static HTML for indexable routes
        run: |
          mkdir -p ./dist/preface ./dist/manifesto ./dist/apply ./dist/login
          cp ./dist/index.html ./dist/preface/index.html
          cp ./dist/index.html ./dist/manifesto/index.html
          cp ./dist/index.html ./dist/apply/index.html
          cp ./dist/index.html ./dist/login/index.html

      - name: Add 404.html for SPA routing fallback
        run: cp ./dist/index.html ./dist/404.html

      - name: Add CNAME for custom domain
        run: echo 'lost-time.org' > ./dist/CNAME

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
